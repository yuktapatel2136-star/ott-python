<!DOCTYPE html>
<html>
<head>
    <title>Edit Category</title>
</head>
<body>

<h2>Edit Category</h2>

<form method="POST">
    {{ form.hidden_tag() }}

    <div>
        {{ form.name.label }} <br>
        {{ form.name(size=40) }}
    </div>
    <br>

    <div>
        {{ form.image.label }} <br>
        {{ form.image(size=60) }}
    </div>
    <br>

    {% if category.image %}
        <p>Current Image:</p>
        <img src="{{ category.image }}" width="150">
        <br><br>
    {% endif %}

    <div>
        {{ form.submit(class="btn btn-success") }}
        <a href="{{ url_for('admin.category_list') }}">Back</a>
    </div>

</form>

</body>
</html>
