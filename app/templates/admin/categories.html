{% extends "base.html" %}
{% block title %}Manage Categories{% endblock %}

{% block content %}
<div class="row pt-4">
    <div class="col-md-4">
        <div class="card bg-dark shadow p-4 border border-secondary mb-4">
            <h3 class="mb-4 text-danger fw-bold">Add Category</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Category Name</label>
                    <input type="text" name="name" class="form-control bg-black text-white border-secondary" required placeholder="e.g. Action, Horror, 2024">
                </div>
                <div class="mb-3">
                    <label class="form-label">Type</label>
                    <select name="type" class="form-select bg-black text-white border-secondary">
                        <option value="genre">Genre (Action, Comedy...)</option>
                        <option value="language">Language (English, Hindi...)</option>
                        <option value="year">Year (2023, 2024...)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-danger w-100">Create Category</button>
            </form>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card bg-dark shadow overflow-hidden">
            <div class="card-header bg-black py-3">
                <h5 class="mb-0">Existing Categories</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Movie Count</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for cat in categories %}
                        <tr>
                            <td class="fw-bold">{{ cat.name }}</td>
                            <td><span class="badge bg-secondary">{{ cat.type }}</span></td>
                            <td>{{ cat.movies|length }}</td>
                            <td>
                                <a href="{{ url_for('admin.delete_category', cat_id=cat.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete category?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
