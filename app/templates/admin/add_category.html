<!DOCTYPE html>
<html>
<head>
    <title>Add Category</title>
</head>
<body>

<h2>Add Category</h2>

<form method="POST">
    {{ form.hidden_tag() }}

    <div>
        {{ form.name.label }} <br>
        {{ form.name(size=40) }}
    </div>
    <br>

    <div>
        {{ form.image.label }} <br>
        {{ form.image(size=60) }}
    </div>
    <br>

    <div>
        {{ form.submit(class="btn btn-primary") }}
        <a href="{{ url_for('admin.category_list') }}">Back</a>
    </div>

</form>

</body>
</html>
