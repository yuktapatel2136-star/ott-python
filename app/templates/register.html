{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card p-4 shadow">
            <h3 class="text-center mb-4">Create Account</h3>
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" id="username" required placeholder="Pick a username">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" name="email" id="email" required placeholder="Enter email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" id="password" required placeholder="Create password">
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm_password" id="confirm_password" required placeholder="Re-enter password">
                </div>
                <button type="submit" class="btn btn-danger w-100">Register</button>
            </form>
            <p class="text-center mt-3 small">
                Already have an account? <a href="{{ url_for('auth.login') }}" class="text-danger">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
